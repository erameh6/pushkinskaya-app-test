# docker-compose.yml — run the whole app with one command:  docker compose up
# Stop with Ctrl+C, or run detached with:  docker compose up -d

services:
  sites-service:
    build: ./services/sites-service
    ports:
      - "5001:5001"
    volumes:
      - ./services/sites-service/photos:/app/photos
    restart: unless-stopped

  identify-service:
    build: ./services/identify-service
    ports:
      - "5002:5002"
    environment:
      - SITES_SERVICE_URL=http://sites-service:5001
    volumes:
      - identify-data:/app/data
    depends_on:
      - sites-service
    restart: unless-stopped

  gateway:
    build: ./services/gateway
    ports:
      - "4000:4000"
    environment:
      - SITES_SERVICE_URL=http://sites-service:5001
      - IDENTIFY_SERVICE_URL=http://identify-service:5002
    depends_on:
      - sites-service
      - identify-service
    restart: unless-stopped

volumes:
  identify-data:
